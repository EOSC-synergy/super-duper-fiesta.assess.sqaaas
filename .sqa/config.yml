config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/super-duper-fiesta:
      branch: main
      repo: https://github.com/PalomoIFCA/super-duper-fiesta
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta git:
        commands:
        - /usr/bin/env sh .sqa/script.lagoon_lucky_raccoon.sh
        container: qc.acc_marigold_carefree_cormorant
  QC.Doc:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.crimson_rustic_hamster.sh
        container: qc.doc_cosmos_intuitive_weasel
      github.com/PalomoIFCA/super-duper-fiesta git:
        commands:
        - /usr/bin/env sh .sqa/script.iris_intuitive_anaconda.sh
        container: qc.doc_peach_reserved_narwhal
      github.com/PalomoIFCA/super-duper-fiesta markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.zinnia_realistic_porpoise.sh
        container: qc.doc_cardamom_upbeat_ocelot
  QC.Lic:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta licensee:
        commands:
        - /usr/bin/env sh .sqa/script.aquamarine_apathetic_stingray.sh
        container: qc.lic_aqua_harmonious_frog
  QC.Ver:
