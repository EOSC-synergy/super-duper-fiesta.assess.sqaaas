config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/super-duper-fiesta:
      branch: main
      repo: https://github.com/PalomoIFCA/super-duper-fiesta
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta git:
        commands:
        - /usr/bin/env sh .sqa/script.silly-cardinal-lion.sh
        container: qc.acc_snippy-burgundy-eel
  QC.Doc:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-denim-zebra.sh
        container: qc.doc_sleazy-tan-seal
      github.com/PalomoIFCA/super-duper-fiesta git:
        commands:
        - /usr/bin/env sh .sqa/script.paltry-burgundy-gerbil.sh
        container: qc.doc_queasy-buff-grouse
      github.com/PalomoIFCA/super-duper-fiesta markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.shaky-firebrick-lobster.sh
        container: qc.doc_trippy-gamboge-gibbon
  QC.Lic:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta licensee:
        commands:
        - /usr/bin/env sh .sqa/script.gimpy-ultramarine-butterfly.sh
        container: qc.lic_blurry-fuchsia-schnauzer
  QC.Ver:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-carmine-lynx.sh
        container: qc.ver_lovely-dandelion-eleuth
timeout: 5400
