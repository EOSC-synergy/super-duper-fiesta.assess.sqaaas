      github.com/PalomoIFCA/super-duper-fiesta get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.fuchsia_melancholy_eel.sh
        container: qc.ver_marina_dramatic_chinchilla
timeout: 5400
