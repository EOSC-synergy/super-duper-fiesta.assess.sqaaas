config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/super-duper-fiesta:
      branch: main
      repo: https://github.com/PalomoIFCA/super-duper-fiesta
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta git:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-aquamarine-shark.sh
        container: qc.acc_nippy-orchid-chimpanzee
  QC.Doc:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-red-maltese.sh
        container: qc.doc_scummy-tan-moose
      github.com/PalomoIFCA/super-duper-fiesta git:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-pumpkin-hamster.sh
        container: qc.doc_beady-pink-jellyfish
      github.com/PalomoIFCA/super-duper-fiesta markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.crabby-ultramarine-balinese.sh
        container: qc.doc_snoopy-white-wrasse
  QC.Lic:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta licensee:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-asparagus-horse.sh
        container: qc.lic_hazy-ochre-argentino
  QC.Ver:
    repos:
      github.com/PalomoIFCA/super-duper-fiesta get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.leaky-chartreuse-cockroach.sh
        container: qc.ver_ready-smalt-flounder
timeout: 5400
